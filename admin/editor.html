<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinaCMS - Page Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

    .container { display: grid; grid-template-columns: 350px 1fr 1fr; height: 100vh; gap: 0; }

    .sidebar {
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
    .sidebar h3 { font-size: 14px; margin-top: 20px; margin-bottom: 10px; color: #666; text-transform: uppercase; font-weight: 600; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary { background: #07c; color: white; }
    .btn-primary:hover { background: #0059b3; }

    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #e8e8e8; }

    .btn-small { padding: 8px 12px; font-size: 13px; margin-bottom: 6px; }

    .editor {
      background: white;
      padding: 30px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .preview {
      background: white;
      overflow-y: auto;
      padding: 0;
    }

    .preview-inner { padding: 30px; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }

    .site-selector {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .block {
      background: #f9f9f9;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      cursor: move;
      position: relative;
      transition: all 0.2s;
    }

    .block:hover { border-color: #07c; box-shadow: 0 2px 8px rgba(7,119,204,0.2); }
    .block.selected { border-color: #07c; background: #f0f7ff; }

    .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .block-title { font-weight: 600; color: #333; font-size: 14px; }
    .block-remove { background: #f44336; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .block-remove:hover { background: #d32f2f; }

    .input-group { margin-bottom: 10px; }
    .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
    .input-group input,
    .input-group textarea,
    .input-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
    }
    .input-group textarea { resize: vertical; min-height: 60px; }

    .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .template-card {
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .template-card:hover { border-color: #07c; }
    .template-card h4 { font-size: 12px; color: #333; margin-top: 8px; }

    .page-title-input {
      font-size: 20px;
      font-weight: 600;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 4px;
      margin-bottom: 15px;
      width: 100%;
    }
    .page-title-input:focus { outline: none; border-color: #07c; }

    .save-status { padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; }
    .save-status.success { background: #d4edda; color: #155724; }
    .save-status.error { background: #f8d7da; color: #721c24; }

    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .gallery-item {
      aspect-ratio: 1;
      background: #f0f0f0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #ddd;
      cursor: pointer;
      font-size: 12px;
      color: #999;
    }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>🎨 TinaCMS</h2>

      <div class="controls">
        <input type="text" id="siteSlug" class="site-selector" placeholder="Site slug (e.g., my-site)" value="example-site">
      </div>

      <div id="saveStatus"></div>

      <button class="btn btn-primary" onclick="loadPage()">Load Page</button>
      <button class="btn btn-secondary" onclick="savePage()">💾 Save Page</button>

      <h3>Templates</h3>
      <div class="template-grid" id="templates"></div>

      <h3>Add Block</h3>
      <button class="btn btn-secondary btn-small" onclick="addBlock('header')">+ Header</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('hero')">+ Hero Section</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('text')">+ Text</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('grid')">+ Grid (3 cols)</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('gallery')">+ Gallery</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('alternate')">+ Alternate Text/Image</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('video')">+ Video</button>
      <button class="btn btn-secondary btn-small" onclick="addBlock('cta')">+ Call to Action</button>
    </div>

    <!-- Editor -->
    <div class="editor">
      <input type="text" id="pageTitle" class="page-title-input" placeholder="Page Title" value="Untitled">
      <div id="blocks"></div>
    </div>

    <!-- Preview -->
    <div class="preview">
      <div class="preview-inner" id="preview"></div>
    </div>
  </div>

  <script>
    const blocks = [];

    const templates = {
      'landing': { name: 'Landing Page', blocks: [
        { type: 'hero', title: 'Welcome', subtitle: 'This is a landing page', bgColor: '#07c', textColor: 'white' },
        { type: 'text', content: '<p>Tell your story here</p>' },
        { type: 'cta', text: 'Get Started', link: '#' }
      ]},
      'portfolio': { name: 'Portfolio', blocks: [
        { type: 'header', title: 'My Work' },
        { type: 'gallery', items: [{image: '/assets/placeholder.jpg'}, {image: '/assets/placeholder.jpg'}, {image: '/assets/placeholder.jpg'}] },
      ]},
      'blog': { name: 'Blog Post', blocks: [
        { type: 'header', title: 'Blog Post Title' },
        { type: 'text', content: '<p>Write your blog content here...</p>' },
      ]},
      'services': { name: 'Services', blocks: [
        { type: 'header', title: 'Our Services' },
        { type: 'grid', items: [{title: 'Service 1', desc: 'Description'}, {title: 'Service 2', desc: 'Description'}, {title: 'Service 3', desc: 'Description'}] },
      ]},
    };

    function initTemplates() {
      const container = document.getElementById('templates');
      Object.entries(templates).forEach(([key, tmpl]) => {
        const card = document.createElement('div');
        card.className = 'template-card';
        card.innerHTML = `<button style="width:100%;border:none;background:#f0f0f0;padding:30px;border-radius:4px;cursor:pointer;">📄</button><h4>${tmpl.name}</h4>`;
        card.onclick = () => loadTemplate(key);
        container.appendChild(card);
      });
    }

    function loadTemplate(key) {
      const template = templates[key];
      blocks.length = 0;
      blocks.push(...JSON.parse(JSON.stringify(template.blocks)));
      render();
    }

    function addBlock(type) {
      const blockTemplates = {
        header: { type: 'header', title: 'Section Title' },
        hero: { type: 'hero', title: 'Hero Title', subtitle: 'Subtitle', bgColor: '#07c', textColor: 'white' },
        text: { type: 'text', content: '<p>Your content here</p>' },
        grid: { type: 'grid', items: [{title: 'Item 1', desc: 'Description'}, {title: 'Item 2', desc: 'Description'}, {title: 'Item 3', desc: 'Description'}] },
        gallery: { type: 'gallery', items: [{image: ''}, {image: ''}, {image: ''}] },
        alternate: { type: 'alternate', image: '', text: 'Your text here', imageFirst: false },
        video: { type: 'video', videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ', title: 'Video Title' },
        cta: { type: 'cta', text: 'Click Here', link: '#', bgColor: '#07c', textColor: 'white' }
      };
      blocks.push(blockTemplates[type]);
      render();
    }

    function removeBlock(index) {
      blocks.splice(index, 1);
      render();
    }

    function updateBlock(index, field, value) {
      blocks[index][field] = value;
      render();
    }

    function updateBlockItem(blockIndex, itemIndex, field, value) {
      if (!blocks[blockIndex].items) blocks[blockIndex].items = [];
      if (!blocks[blockIndex].items[itemIndex]) blocks[blockIndex].items[itemIndex] = {};
      blocks[blockIndex].items[itemIndex][field] = value;
      render();
    }

    function render() {
      renderEditor();
      renderPreview();
    }

    function renderEditor() {
      const container = document.getElementById('blocks');
      container.innerHTML = '';
      blocks.forEach((block, i) => {
        const el = document.createElement('div');
        el.className = 'block';
        el.innerHTML = `
          <div class="block-header">
            <span class="block-title">${block.type.toUpperCase()}</span>
            <button class="block-remove" onclick="removeBlock(${i})">Remove</button>
          </div>
          ${renderBlockEditor(block, i)}
        `;
        container.appendChild(el);
      });
    }

    function renderBlockEditor(block, idx) {
      switch(block.type) {
        case 'header':
          return `<div class="input-group">
            <label>Title</label>
            <input type="text" value="${block.title}" onchange="updateBlock(${idx}, 'title', this.value)">
          </div>`;
        case 'hero':
          return `<div class="input-group">
            <label>Title</label>
            <input type="text" value="${block.title}" onchange="updateBlock(${idx}, 'title', this.value)">
          </div>
          <div class="input-group">
            <label>Subtitle</label>
            <input type="text" value="${block.subtitle}" onchange="updateBlock(${idx}, 'subtitle', this.value)">
          </div>
          <div class="input-group">
            <label>Background Color</label>
            <input type="color" value="${block.bgColor}" onchange="updateBlock(${idx}, 'bgColor', this.value)">
          </div>`;
        case 'text':
          return `<div class="input-group">
            <label>Content (HTML)</label>
            <textarea onchange="updateBlock(${idx}, 'content', this.value)">${block.content}</textarea>
          </div>`;
        case 'grid':
          return (block.items || []).map((item, i) => `
            <div class="input-group">
              <label>Item ${i+1} Title</label>
              <input type="text" value="${item.title || ''}" onchange="updateBlockItem(${idx}, ${i}, 'title', this.value)">
              <label>Description</label>
              <input type="text" value="${item.desc || ''}" onchange="updateBlockItem(${idx}, ${i}, 'desc', this.value)">
            </div>
          `).join('');
        case 'gallery':
          return (block.items || []).map((item, i) => `
            <div class="input-group">
              <label>Image ${i+1} URL</label>
              <input type="text" value="${item.image || ''}" onchange="updateBlockItem(${idx}, ${i}, 'image', this.value)">
            </div>
          `).join('');
        case 'alternate':
          return `<div class="input-group">
            <label>Image URL</label>
            <input type="text" value="${block.image}" onchange="updateBlock(${idx}, 'image', this.value)">
          </div>
          <div class="input-group">
            <label>Text Content</label>
            <textarea onchange="updateBlock(${idx}, 'text', this.value)">${block.text}</textarea>
          </div>
          <div class="input-group">
            <label><input type="checkbox" ${block.imageFirst ? 'checked' : ''} onchange="updateBlock(${idx}, 'imageFirst', this.checked)"> Image First</label>
          </div>`;
        case 'video':
          return `<div class="input-group">
            <label>Video URL (embed)</label>
            <input type="text" value="${block.videoUrl}" onchange="updateBlock(${idx}, 'videoUrl', this.value)">
          </div>
          <div class="input-group">
            <label>Title</label>
            <input type="text" value="${block.title || ''}" onchange="updateBlock(${idx}, 'title', this.value)">
          </div>`;
        case 'cta':
          return `<div class="input-group">
            <label>Button Text</label>
            <input type="text" value="${block.text}" onchange="updateBlock(${idx}, 'text', this.value)">
          </div>
          <div class="input-group">
            <label>Link URL</label>
            <input type="text" value="${block.link}" onchange="updateBlock(${idx}, 'link', this.value)">
          </div>
          <div class="input-group">
            <label>Background Color</label>
            <input type="color" value="${block.bgColor || '#07c'}" onchange="updateBlock(${idx}, 'bgColor', this.value)">
          </div>`;
        default: return '';
      }
    }

    function renderPreview() {
      const container = document.getElementById('preview');
      const title = document.getElementById('pageTitle').value;
      let html = `<h1 style="margin-bottom:30px;color:#333;">${title}</h1>`;

      blocks.forEach(block => {
        switch(block.type) {
          case 'header':
            html += `<h2 style="margin:30px 0 15px;font-size:28px;color:#333;">${block.title}</h2>`;
            break;
          case 'hero':
            html += `<div style="background:${block.bgColor};color:${block.textColor};padding:60px 40px;border-radius:8px;text-align:center;margin:30px 0;">
              <h2 style="font-size:36px;margin-bottom:15px;">${block.title}</h2>
              <p style="font-size:18px;opacity:0.9;">${block.subtitle}</p>
            </div>`;
            break;
          case 'text':
            html += `<div style="margin:30px 0;line-height:1.6;color:#555;">${block.content}</div>`;
            break;
          case 'grid':
            html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:30px 0;">
              ${(block.items || []).map(item => `
                <div style="border:1px solid #ddd;padding:20px;border-radius:8px;">
                  <h3 style="margin-bottom:10px;color:#333;">${item.title}</h3>
                  <p style="color:#666;font-size:14px;">${item.desc}</p>
                </div>
              `).join('')}
            </div>`;
            break;
          case 'gallery':
            html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:30px 0;">
              ${(block.items || []).map(item => `
                <img src="${item.image || '/assets/placeholder.jpg'}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;">
              `).join('')}
            </div>`;
            break;
          case 'alternate':
            const cols = block.imageFirst ? 'auto 1fr' : '1fr auto';
            html += `<div style="display:grid;grid-template-columns:${cols};gap:40px;align-items:center;margin:30px 0;">
              <img src="${block.image || '/assets/placeholder.jpg'}" style="width:100%;border-radius:8px;">
              <div style="line-height:1.6;color:#555;">${block.text}</div>
            </div>`;
            break;
          case 'video':
            html += `<div style="margin:30px 0;">
              ${block.title ? `<h3 style="margin-bottom:15px;color:#333;">${block.title}</h3>` : ''}
              <iframe width="100%" height="400" src="${block.videoUrl}" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>
            </div>`;
            break;
          case 'cta':
            html += `<div style="text-align:center;margin:40px 0;padding:30px;background:#f9f9f9;border-radius:8px;">
              <a href="${block.link}" style="display:inline-block;background:${block.bgColor || '#07c'};color:${block.textColor || 'white'};padding:15px 40px;border-radius:6px;text-decoration:none;font-weight:bold;font-size:16px;">${block.text}</a>
            </div>`;
            break;
        }
      });

      container.innerHTML = html;
    }

    async function savePage() {
      const status = document.getElementById('saveStatus');
      try {
        const slug = document.getElementById('siteSlug').value || 'example-site';
        const title = document.getElementById('pageTitle').value;
        const preview = document.getElementById('preview').innerHTML;

        const response = await fetch('/api/pages/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slug: slug,
            html: `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    a { color: #07c; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    ${preview}
  </div>
  <hr style="margin: 40px 0; border: none; border-top: 1px solid #ddd;">
  <footer style="text-align: center; padding: 20px; color: #999; font-size: 12px;">
    <p>Built with TinaCMS • <a href="/admin/editor?site=${slug}">Edit this page</a></p>
  </footer>
</body>
</html>`
          })
        });

        const result = await response.json();
        if (result.success) {
          status.innerHTML = `<div class="save-status success">✓ Saved to /sites/${result.slug}/</div>`;
          setTimeout(() => { status.innerHTML = ''; }, 3000);
        }
      } catch (e) {
        status.innerHTML = `<div class="save-status error">✗ Error: ${e.message}</div>`;
      }
    }

    async function loadPage() {
      try {
        const slug = document.getElementById('siteSlug').value || 'example-site';
        const response = await fetch(`/api/pages/${slug}`);
        const data = await response.json();

        if (data.html) {
          // Parse title from HTML
          const titleMatch = data.html.match(/<title>(.*?)<\/title>/);
          if (titleMatch) document.getElementById('pageTitle').value = titleMatch[1];

          // For now, reset blocks - in a real app, would parse the HTML
          blocks.length = 0;
          blocks.push({ type: 'text', content: '<p>Loaded page - edit blocks to customize</p>' });
          render();
        }
      } catch (e) {
        alert('Page not found. Starting with empty page.');
        blocks.length = 0;
        render();
      }
    }

    // Check URL for site parameter
    const params = new URLSearchParams(window.location.search);
    if (params.get('site')) {
      document.getElementById('siteSlug').value = params.get('site');
      loadPage();
    } else {
      loadTemplate('landing');
    }

    initTemplates();
    render();
  </script>
</body>
</html>
