et=\"_blank\" href=\"http://phoenixprocess.mystrikingly.com\"&gt;reorganizes</a&gt;</strong&gt; itself. Liquid states can bring up transformational <strong&gt;<a target=\"_blank\" href=\"http://4feelings.mystrikingly.com\"&gt;feelings</a&gt;</strong&gt; and <strong&gt;<a target=\"_blank\" href=\"http://4emotions.mystrikingly.com\"&gt;emotions</a&gt;</strong&gt;. By <strong&gt;<a target=\"_blank\" href=\"http://alifeoflearning.mystrikingly.com\"&gt;upgrading your thoughtware</a&gt;</strong&gt; you <strong&gt;<a target=\"_blank\" href=\"http://buildmatrix.mystrikingly.com\"&gt;build matrix</a&gt;</strong&gt; to hold more <strong&gt;<a target=\"_blank\" href=\"http://wholepermaculture.mystrikingly.com/\"&gt;consciousness</a&gt;</strong&gt; and leave behind a <strong&gt;<a href=\"http://lowdrama.mystrikingly.com/\"&gt;low drama</a&gt;</strong&gt; life of <strong&gt;<a href=\"http://reactivity.mystrikingly.com/\"&gt;reactivity</a&gt;</strong&gt;. No one can upgrade your thoughtware for you. More interestingly, no one can stop you from upgrading your thoughtware. Our theory is that when we <strong&gt;<a target=\"_blank\" href=\"http://alifeofpractice.mystrikingly.com\"&gt;collectively build</a&gt;</strong&gt; 1,000,000 new Matrix Points we will change the morphogenetic field of the human race for the better. Please choose <strong&gt;<a target=\"_blank\" href=\"http://radicalresponsibility.mystrikingly.com\"&gt;responsibly</a&gt;</strong&gt; to read this website. Reading this whole website is worth 1 Matrix Point. Doing any of the experiments earns you additional Matrix Points. Please use Matrix Code <strong&gt;GOTOEDGE.00</strong&gt; to log your Matrix Point for reading this website on <strong&gt;<a target=\"_blank\" href=\"http://startoverxyz.mystrikingly.com/\"&gt;StartOver.xyz</a&gt;</strong&gt;. Thank you for playing full out!</p&gt;","backupValue":null,"version":1},"button1":{"type":"Button","id":"f_654a41e7-a8f1-42f4-9718-d30b12761f71","defaultValue":true,"text":"",
