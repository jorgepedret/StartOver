id":"f_daa4a589-02d8-45df-a97b-6dcfd14ce67d","defaultValue":false,"value":"","backupValue":null,"version":1},"button1":{"type":"Button","id":"f_dcf3d4d6-7219-46e4-8bd3-3bd437b95637","defaultValue":true,"text":"","url":"","new_target":null}}},{"type":"RepeatableItem","id":"f_6a1e1a44-6879-4170-af96-382c211a12fd","defaultValue":true,"components":{"media1":{"type":"Media","id":"f_0dda5640-82e0-45b6-8062-b16116987e89","defaultValue":true,"video":{"type":"Video","id":"f_fc0c2fa8-54c7-4d66-a69e-b07cef3e4ab3","defaultValue":true,"html":"","url":"http://vimeo.com/18150336","thumbnail_url":null,"maxwidth":700,"description":null},"image":{"type":"Image","id":"f_53c3f7c0-e8ec-46fe-a118-2c92e117aea4","defaultValue":true,"link_url":"http://%E2%80%8Bhttp://torustechnology.mystrikingly.com","thumb_url":"!","url":"!","caption":"Torus Meeting Technologies with Possibility Management","description":"","storageKey":"1751300/316819_297347","storage":"s","storagePrefix":null,"format":"jpeg","h":300,"w":300,"s":27809,"new_target":true,"focus":null},"current":"image"},"text1":{"type":"RichText","id":"f_54cd335d-e3df-4e7c-a1aa-23328cdf1370","defaultValue":false,"value":"<h3 style=\"font-size:24px;\"&gt;<strong&gt;Torus Meeting Technologies</strong&gt;</h3&gt;","backupValue":null,"version":1},"text2":{"type":"RichText","id":"f_0dc668b0-3221-40cf-8eb4-ce8d1e496af3","defaultValue":false,"value":"<p&gt;<a target=\"_blank\" href=\"http://%E2%80%8Bhttp://torustechnology.mystrikingly.com\"&gt;<strong&gt;torustechnology.org</strong&gt;</a&gt;</p&gt;","backupValue":null,"version":1},"text3":{"type":"RichText","id":"f_b6622e09-d0ee-4959-9ed2-3464eea8865c","defaultValue":false,"value":"<p style=\"text-align: left;\"&gt;You are bringing people together to start a community project?</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;USUAL STRATEGY: You bring everybody together. The vegans argue with the vegetarians. The Holocracy people argue with the Sociocracy 3.0 people. The homeschoolers argue with the unschoolers. The M. Scott Peck Community Building people argue with the Nonviolent Communication people. The Six Step Consensus people argue with the Anarchy people. You have created a mixed-context gameworld. The main complaint of participants is: Where is the community? Sadness and frustration prevail.</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;EXTRAORDINARY STRATEGY: You meet with <a target=\"_blank\" href=\"http://3cells.mystrikingly.com\"&gt;three people</a&gt; who are already deeply committed to a single <a target=\"_blank\" href=\"http://setcontext.mystrikingly.com\"&gt;Context</a&gt;. Together you deepen the Context. Start to design your <a target=\"_blank\" href=\"http://gaiangameworlds.mystrikingly.com\"&gt;Gaian Gameworld</a&gt; so that it feeds and nurtures Gaia. Consider your Rules of Engagement - how other people can successfully play in your world with you, how to get in, how to get out, so that your <a target=\"_blank\" href=\"http://gameworldbuilder.mystrikingly.com\"&gt;gameworld</a&gt; is intelligently evolves. Learn to optimize group intelligence in a <a target=\"_blank\" href=\"http://thehierarchy.mystrikingly.com\"&gt;Circle</a&gt;. Write your <a target=\"_blank\" href=\"http://writeyourarticle.mystrikingly.com\"&gt;Codex</a&gt;. Build your <a target=\"_blank\" href=\"http://makeyourwebsite.mystrikingly.com\"&gt;Website</a&gt;. Send out your <a target=\"_blank\" href=\"http://writeyournewsletter.mystrikingly.com\"&gt;Newsletter</a&gt;. Feed your <a target=\"_blank\" href=\"http://yourcircle.mystrikingly.com\"&gt;Circle</a&gt;.</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;You need all <a target=\"_blank\" href=\"http://4lineages.mystrikingly.com\"&gt;Four Archetypal Lineages</a&gt;.</p&gt;<p style=\"text-align: left;\"&gt;You need all <a target=\"_blank\" href=\"http://4brains.mystrikingly.com\"&gt;Four Brain Types</a&gt;.</p&gt;<p style=\"text-align: left;\"&gt;You need all <a target=\"_blank\" href=\"http://4feelings.mystrikingly.com\"&gt;Four Feelings</a&gt; and all <a target=\"_blank\" href=\"http://5bodies.mystrikingly.com\"&gt;5 Bodies</a&gt; of every <a target=\"_blank\" href=\"http://edgeworker.mystrikingly.com\"&gt;Edgeworker</a&gt; in your <a target=\"_blank\" href=\"http://yourteams.mystrikingly.com\"&gt;Team</a&gt;.</p&gt;<p style=\"text-align: left;\"&gt;And you need <a target=\"_blank\" href=\"http://torustechnology.mystrikingly.com\"&gt;Torus Meeting Technologies</a&gt; to transform conflicts, unbind hidden competing commitments, unwind secret hierarchies, and <a target=\"_blank\" href=\"http://swordofclarity.mystrikingly.com\"&gt;Clarify</a&gt; <a target=\"_blank\" href=\"http://reactivity.mystrikingly.com\"&gt;Reactivity</a&gt;, unhealed childhood wounds, fears, and breakdowns into new <a target=\"_blank\" href=\"http://possibility.mystrikingly.com\"&gt;Possibilities</a&gt;.</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;Please contact us to discuss your ideas.</p&gt;","backupValue":null,"version":1},"button1":{"type":"Button","id":"f_9523afd9-fce8-426e-9c91-283804d1d414","defaultValue":true,"text":"","url":"","new_target":null}}},{"type":"RepeatableItem","id":"f_170b9de1-9b09-4488-9f61-563feacd4da7","defaultValue":true,"components":{"media1":{"type":"Media","id":"f_9cd723c8-6852-45a6-a8e5-ee5e06f82dc6","defaultValue":true,"video":{"type":"Video","id":"f_6a51dd85-efc0-4241-bdb0-3057ba75007b","defaultValue":true,"html":"","url":"http://vimeo.com/18150336","thumbnail_url":null,"maxwidth":700,"description":null},"image":{"type":"Image","id":"f_b17406a3-4442-4175-a9a3-00099cf1b750","defaultValue":true,"link_url":"http://wholepermaculture.mystrikingly.com","thumb_url":"!","url":"!","caption":"Whole Permaculture with Possibility Management","description":"","storageKey":"1751300/376619_928966","storage":"s","storagePrefix":null,"format":"jpeg","h":300,"w":300,"s":31307,"new_target":true,"focus":null},"current":"image"},"text1":{"type":"RichText","id":"f_d1d85c37-9e01-43de-afa2-be0398cabc1d","defaultValue":false,"value":"<h3 style=\"font-size:24px;\"&gt;<strong&gt;Inner + Outer = Whole Permaculture</strong&gt;</h3&gt;","backupValue":null,"version":1},"text2":{"type":"RichText","id":"f_26cc0d92-2735-4aeb-a57b-a8269c1615c1","defaultValue":false,"value":"<p&gt;<a target=\"_blank\" href=\"http://%E2%80%8Bhttp://wholepermaculture.mystrikingly.com\"&gt;<strong&gt;wholepermaculture.org</strong&gt;</a&gt;</p&gt;","backupValue":null,"version":1},"text3":{"type":"RichText","id":"f_cb61b4e8-0052-4812-8175-880e9df4f24c","defaultValue":false,"value":"<p style=\"text-align: left;\"&gt;Perhaps you have become an expert in soil regeneration, seed saving, and natural pest management... this is Outer Permaculture. What about your Inner Permaculture skills?</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;Your Permaculture Design Certificates can add several layers deeper work when you teach people:</p&gt;<ul&gt;<li style=\"text-align: left;\"&gt;How to <a target=\"_blank\" href=\"http://holdspace.mystrikingly.com\"&gt;Hold</a&gt; and <a target=\"_blank\" href=\"http://navigatespace.mystrikingly.com\"&gt;Navigate Space</a&gt; with <a target=\"_blank\" href=\"http://radicalresponsibility.mystrikingly.com\"&gt;Radical Responsibility</a&gt;.</li&gt;<li style=\"text-align: left;\"&gt;The crucial difference between <a target=\"_blank\" href=\"http://4feelings.mystrikingly.com\"&gt;Feelings and Emotions</a&gt;.</li&gt;<li style=\"text-align: left;\"&gt;The two universes of <a target=\"_blank\" href=\"http://2dramas.mystrikingly.com\"&gt;Low Drama and High Drama</a&gt;.</li&gt;<li style=\"text-align: left;\"&gt;How to stay&amp;nbsp;<a target=\"_blank\" href=\"http://becomecentered.mystrikingly.com\"&gt;Centered</a&gt;&amp;nbsp;in <a target=\"_blank\" href=\"http://firstposition.mystrikingly.com\"&gt;First Position</a&gt; of a <a target=\"_blank\" href=\"http://possibilitatortraining.mystrikingly.com\"&gt;Possibilitator</a&gt;.</li&gt;<li style=\"text-align: left;\"&gt;How to end&amp;nbsp;being <a target=\"_blank\" href=\"http://sparks.nextculture.org/res/sparks/Spark-220-en.pdf\"&gt;Adaptive</a&gt;&amp;nbsp;and use the <a target=\"_blank\" href=\"http://speakfromtheunknown.mystrikingly.com\"&gt;Unknown</a&gt; as a resource.</li&gt;<li style=\"text-align: left;\"&gt;How to <a target=\"_blank\" href=\"http://decontamination.mystrikingly.com\"&gt;Decontaminate</a&gt; your <a target=\"_blank\" href=\"http://egostate.mystrikingly.com\"&gt;Adult Ego State</a&gt; from your&amp;nbsp;<a target=\"_blank\" href=\"http://yourgremlin.mystrikingly.com\"&gt;Gremlin</a&gt;&amp;nbsp;so he / she / it sits ready&amp;nbsp;at your side as an ally rather than running your life into the dirt.</li&gt;</ul&gt;<p style=\"text-align: left;\"&gt;Authentic <a target=\"_blank\" href=\"http://adulthood.mystrikingly.com\"&gt;Adulthood</a&gt; <a target=\"_blank\" href=\"http://initiations.mystrikingly.com\"&gt;Initiatory</a&gt; <a target=\"_blank\" href=\"http://process.mystrikingly.com\"&gt;Processes</a&gt; are located at the center of regenerative cultures.</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;You can already grow plants. Now learn how to <a target=\"_blank\" href=\"http://8prisons.mystrikingly.com\"&gt;grow people</a&gt;.</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;New Article: <a target=\"_blank\" href=\"https://ecovillage.org/solution/upgrading-thoughtware-on-your-way-to-archearchy/\"&gt;https://ecovillage.org/solution/upgrading-thoughtware-on-your-way-to-archearchy/</a&gt;</p&gt;<p style=\"text-align: left;\"&gt;&amp;nbsp;</p&gt;<p style=\"text-align: left;\"&gt;Please contact us to discuss your ideas.</p&gt;","backupValue":null,"version":1},"button1 align: left;\"\u003e\u0026nbsp;\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003eEXTRAORDINARY STRATEGY: You meet with \u003ca target=\"_blank\" href=\"http:\/\/3cells.mystrikingly.com\"\u003ethree people\u003c\/a\u003e who are already deeply committed to a single \u003ca target=\"_blank\" href=\"http:\/\/setcontext.mystrikingly.com\"\u003eContext\u003c\/a\u003e. Together you deepen the Context. Start to design your \u003ca target=\"_blank\" href=\"http:\/\/gaiangameworlds.mystrikingly.com\"\u003eGaian Gameworld\u003c\/a\u003e so that it feeds and nurtures Gaia. Consider your Rules of Engagement - how other people can successfully play in your world with you, how to get in, how to get out, so that your \u003ca target=\"_blank\" href=\"http:\/\/gameworldbuilder.mystrikingly.com\"\u003egameworld\u003c\/a\u003e is intelligently evolves. Learn to optimize group intelligence in a \u003ca target=\"_blank\" href=\"http:\/\/thehierarchy.mystrikingly.com\"\u003eCircle\u003c\/a\u003e. Write your \u003ca target=\"_blank\" href=\"http:\/\/writeyourarticle.mystrikingly.com\"\u003eCodex\u003c\/a\u003e. Build your \u003ca target=\"_blank\" href=\"http:\/\/makeyourwebsite.mystrikingly.com\"\u003eWebsite\u003c\/a\u003e. Send out your \u003ca target=\"_blank\" href=\"http:\/\/writeyournewsletter.mystrikingly.com\"\u003eNewsletter\u003c\/a\u003e. Feed your \u003ca target=\"_blank\" href=\"http:\/\/yourcircle.mystrikingly.com\"\u003eCircle\u003c\/a\u003e.\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003e\u0026nbsp;\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003eYou need all \u003ca target=\"_blank\" href=\"http:\/\/4lineages.mystrikingly.com\"\u003eFour Archetypal Lineages\u003c\/a\u003e.\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003eYou need all \u003ca target=\"_blank\" href=\"http:\/\/4brains.mystrikingly.com\"\u003eFour Brain Types\u003c\/a\u003e.\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003eYou need all \u003ca target=\"_blank\" href=\"http:\/\/4feelings.mystrikingly.com\"\u003eFour Feelings\u003c\/a\u003e and all \u003ca target=\"_blank\" href=\"http:\/\/5bodies.mystrikingly.com\"\u003e5 Bodies\u003c\/a\u003e of every \u003ca target=\"_blank\" href=\"http:\/\/edgeworker.mystrikingly.com\"\u003eEdgeworker\u003c\/a\u003e in your \u003ca target=\"_blank\" href=\"http:\/\/yourteams.mystrikingly.com\"\u003eTeam\u003c\/a\u003e.\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003eAnd you need \u003ca target=\"_blank\" href=\"http:\/\/torustechnology.mystrikingly.com\"\u003eTorus Meeting Technologies\u003c\/a\u003e to transform conflicts, unbind hidden competing commitments, unwind secret hierarchies, and \u003ca target=\"_blank\" href=\"http:\/\/swordofclarity.mystrikingly.com\"\u003eClarify\u003c\/a\u003e \u003ca target=\"_blank\" href=\"http:\/\/reactivity.mystrikingly.com\"\u003eReactivity\u003c\/a\u003e, unhealed childhood wounds, fears, and breakdowns into new \u003ca target=\"_blank\" href=\"http:\/\/possibility.mystrikingly.com\"\u003ePossibilities\u003c\/a\u003e.\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003e\u0026nbsp;\u003c\/p\u003e\u003cp style=\"text-align: left;\"\u003ePlease contact us to discuss your ideas.\u003c\/p\u003e","backupValue":null,"version":1},"button1":{"type":"Button","id":"f_9523afd9-fce8-426e-9c91-283804d1d414","defaultValue":true,"text":"","url":"","new_target":null}}},{"type":"RepeatableItem","id":"f_170b9de1-9b09-4488-9f61-563feacd4da7","defaultValue":true,"components":{"media1":{"type":"Media","id":"f_9cd723c8-6852-45a6-a8e5-ee5e06f82dc6","defaultValue":true,"video":{"type":"Video","id":"f_6a51dd85-efc0-4241-bdb0-3057ba75007b","defaultValue":true,"html":"","url":"http:\/\/vimeo.com\/18150336","thumbnail_url":null,"maxwidth":700,"description":null},"image":{"type":"Image","id":"f_b17406a3-4442-4175-a9a3-00099cf1b750","defaultValue":true,"link_url":"http:\/\/wholepermaculture.mystrikingly.com","thumb_url":"!","url":"!","caption":"Whole Permaculture with Possibility
